<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin Peperiksaan Pertengahan 1 (Mac) 2026</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* ================= KOD CSS: REKA BENTUK UI ================= */
        :root {
            --night-blue: #151B54;
            --light-blue: #e0eafc;
            --gradient-bg: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--gradient-bg);
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        header {
            background-color: var(--night-blue);
            background-image: linear-gradient(135deg, rgba(255,255,255,0.05) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.05) 75%, transparent 75%, transparent);
            background-size: 40px 40px;
            color: white; 
            text-align: center; 
            padding: 30px 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header img { max-height: 120px; margin-bottom: 15px; }
        header h1 { margin: 0; font-size: 2rem; letter-spacing: 1.5px; text-transform: uppercase; }
        header h2 { margin: 10px 0 0 0; font-weight: 300; font-size: 1.3rem; color: #d1d9ff; }

        .container {
            flex: 1; width: 95%; max-width: 1400px; margin: 30px auto;
            background: rgba(255, 255, 255, 0.98); border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; overflow-x: auto;
        }

        /* Log Masuk */
        #login-section { display: flex; justify-content: center; padding: 60px 20px; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); width: 100%; max-width: 380px; text-align: center; border-top: 5px solid var(--night-blue); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; box-sizing: border-box;}
        button { background-color: var(--night-blue); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.5px;}
        button:hover { background-color: #0b0f36; transform: translateY(-2px); }
        
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px;}
        .btn-group button { width: auto; padding: 10px 20px; font-size: 0.9rem;}
        .btn-logout { background-color: #d32f2f !important; } .btn-logout:hover { background-color: #b71c1c !important; }
        .btn-print { background-color: #0288d1 !important; } .btn-print:hover { background-color: #01579b !important; }

        .dashboard { display: none; }
        .tab-nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--night-blue); margin-bottom: 25px; padding-bottom: 15px; flex-wrap: wrap; gap:15px; }
        .tab-nav h2 { margin: 0; color: var(--night-blue); text-transform: uppercase; font-size: 1.5rem;}
        
        .admin-controls { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; display:flex; gap:15px; flex-wrap:wrap; justify-content:center; align-items:center; margin-bottom:20px;}
        .admin-controls select { width: 220px; margin: 0; }
        
        .radio-group { display: flex; gap: 15px; background: white; padding: 10px 20px; border-radius: 6px; border: 1px solid #ccc; }
        .radio-group label { font-weight: bold; cursor: pointer; color: var(--night-blue); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th, td { border: 1px solid #ddd; padding: 10px 8px; text-align: center; vertical-align: middle; }
        th { background-color: var(--night-blue); color: white; font-weight: 600; white-space: nowrap; }
        tr:nth-child(even) { background-color: #f4f6fc; }
        tr:hover { background-color: #e8eaf6; }

        .null-mark { background-color: #ffebee; color: #c62828; font-weight: bold; }
        .stats-card { background: white; padding: 15px; border-radius: 8px; border-left: 5px solid var(--night-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }

        .chart-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 30px; justify-content: center; }
        .chart-box { background: white; border: 1px solid #eee; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; min-width: 300px; max-width: 600px; }

        footer { text-align: center; padding: 20px; background-color: var(--night-blue); color: #d1d9ff; font-size: 0.95rem; margin-top: auto; letter-spacing: 1px; }

        /* KOD CSS: CETAKAN */
        @media print {
            @page { margin: 15mm; size: landscape; }
            body { background: white !important; color: black; }
            header, footer, .no-print, #login-section, .admin-controls, .chart-container { display: none !important; }
            .container { box-shadow: none; width: 100%; margin: 0; padding: 0; }
            .print-header { display: block !important; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #000; padding-bottom: 15px;}
            .print-header img { width: 100%; max-height: 120px; object-fit: contain; }
            table { font-size: 10pt; width: 100%; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            th { background-color: #e0e0e0 !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            th, td { border: 1px solid black !important; padding: 5px !important; }
        }
        .print-header { display: none; }
        .print-area { display: none; }
        @media print { .print-area.active { display: block; } .dashboard-admin.hidden-print { display: none !important; } }
    </style>
</head>
<body>

    <header class="no-print">
        <img src="https://i.ibb.co/VYSKMXf1/Logo-Selirik.png" alt="Logo SMK Selirik">
        <h1>SMK SELIRIK, KAPIT</h1>
        <h2>Portal Admin Peperiksaan Pertengahan 1 (Mac) 2026</h2>
    </header>

    <div class="container">
        <div id="login-section">
            <div class="login-box">
                <h2 style="color: var(--night-blue); margin-top:0;">Log Masuk Admin</h2>
                <input type="text" id="userid" placeholder="ID Admin" required>
                <input type="password" id="password" placeholder="Kata Laluan" required>
                <button onclick="login()">Log Masuk</button>
                <p id="login-error" style="color:#d32f2f; display:none; font-size:0.9rem; margin-top:15px; font-weight:bold;">Kredensial tidak sah.</p>
            </div>
        </div>

        <div id="dashboard-admin" class="dashboard dashboard-admin">
            <div class="tab-nav no-print">
                <h2>Dashboard Pentadbir</h2>
                <div class="btn-group" style="margin-bottom:0;">
                    <button class="btn-logout" onclick="logout()">Keluar</button>
                </div>
            </div>
            
            <div class="admin-controls no-print">
                <select id="admin-tingkatan" onchange="loadData()">
                    <option value="">-- Pilih Tingkatan --</option>
                    <option value="1">Tingkatan 1</option>
                    <option value="2">Tingkatan 2</option>
                    <option value="3">Tingkatan 3</option>
                    <option value="4">Tingkatan 4</option>
                    <option value="5">Tingkatan 5</option>
                </select>
                
                <div class="radio-group" id="mod-paparan" style="display:none;">
                    <label><input type="radio" name="mod" value="kelas" onclick="tukarMod()" checked> Paparan Kelas</label>
                    <label><input type="radio" name="mod" value="subjek" onclick="tukarMod()"> Paparan Subjek</label>
                    <label><input type="radio" name="mod" value="pantau" onclick="tukarMod()"> Pemantauan Khas</label>
                    <label><input type="radio" name="mod" value="cetak" onclick="tukarMod()"> Menu Cetakan</label>
                </div>
            </div>

            <div id="dynamic-controls" class="admin-controls no-print" style="display:none; background:white; border-color:var(--night-blue);">
                </div>

            <div id="status-mesej" style="text-align:center; font-weight:bold; color:var(--night-blue); margin: 15px 0;" class="no-print"></div>

            <div id="admin-content"></div>

            <div id="chart-section" class="chart-container no-print" style="display:none;">
                <div class="chart-box"><canvas id="grafSatu"></canvas></div>
                <div class="chart-box"><canvas id="grafDua"></canvas></div>
            </div>
        </div>
        
        <div id="print-zone" class="print-area"></div>
    </div>

    <footer class="no-print">Hakcipta NDJE@Selirik, Kapit 2026</footer>

    <script>
        // --- 1. KONFIGURASI URL & PEMETAAN ---
        const csvUrls = {
            "1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS9ngcL37KMX8ZDsGKomo7Lv6yowNqFdcWciJuvS1UkUU6aFHI_VKuFDLP1d0fKtMlXTW8APMYD38xZ/pub?gid=1419213935&single=true&output=csv",
            "2": "https://docs.google.com/spreadsheets/d/e/2PACX-1vSD6QwXil_0_gA0OBb2t82FneuCt68Sp7P9-He4zyBPEoaVHkJent8hiCSFPa33F-AEmR9BgeEogpt-/pub?gid=1419213935&single=true&output=csv",
            "3": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg40cTCNS7MVyZVA3-8sZkbNtVT_Db9abxz6xhv1ccZ5ZksWIy0qyn8y30lqxG9G9YN1TOMBXF7WCY/pub?gid=1419213935&single=true&output=csv",
            "4": "https://docs.google.com/spreadsheets/d/e/2PACX-1vR831uDWcPfxf9zOj-mekolv_DMkdsYRMdVsxoLcKqwL88z-tetvP57ti5wB5M2dYIXYVZf9eX7R6Q8/pub?gid=1615224868&single=true&output=csv",
            "5": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRq9lzeK5sombRvA2WRgEYGygUdZwEfifZHVy4IMZiRD7c-yll60qkA4pXeBBocqJsRV6GpM1uazU_B/pub?gid=1615224868&single=true&output=csv"
        };

        const col = (str) => { let c=0; for(let i=0;i<str.length;i++) c=c*26+(str.charCodeAt(i)-64); return c-1; };

        const mapAtas = {
            'BM':{m:col('E'), g:col('F')}, 'SEJ':{m:col('G'), g:col('H')}, 'ENG':{m:col('I'), g:col('J')},
            'MATHS':{m:col('K'), g:col('L')}, 'PM':{m:col('M'), g:col('N')}, 'PI':{m:col('O'), g:col('P')},
            'SN':{m:col('Q'), g:col('R')}, 'PSV':{m:col('S'), g:col('T')}, 'BIB':{m:col('U'), g:col('V')},
            'RC':{m:col('W'), g:col('X')}, 'PP':{m:col('Y'), g:col('Z')}, 'FIZ':{m:col('AA'), g:col('AB')},
            'KIM':{m:col('AC'), g:col('AD')}, 'BIO':{m:col('AE'), g:col('AF')}, 'ADD MATHS':{m:col('AG'), g:col('AH')},
            'SK':{m:col('AI'), g:col('AJ')}, 'KAG':{m:col('AK'), g:col('AL')}, 'PJPK':{m:col('BK'), g:col('BL')}
        };
        const mapRendah = {
            'BM':{m:col('E'), g:col('F')}, 'ENG':{m:col('G'), g:col('H')}, 'MATHS':{m:col('I'), g:col('J')},
            'SEJ':{m:col('K'), g:col('L')}, 'SN':{m:col('M'), g:col('N')}, 'GEO':{m:col('O'), g:col('P')},
            'BIB':{m:col('Q'), g:col('R')}, 'PM':{m:col('S'), g:col('T')}, 'PI':{m:col('U'), g:col('V')},
            'RBT':{m:col('W'), g:col('X')}, 'ASK':{m:col('Y'), g:col('Z')}, 'PSV':{m:col('AA'), g:col('AB')},
            'PJPK':{m:col('AO'), g:col('AP')}
        };

        let state = { data: [], ting: '', mod: 'kelas', charts: [], headers: [] };

        // --- 2. SISTEM LOG MASUK ---
        function login() {
            const id = document.getElementById('userid').value;
            const pass = document.getElementById('password').value;
            if (id === 'Admin7102' && pass === 'Admin7102') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-admin').style.display = 'block';
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }
        function logout() { location.reload(); }

        // --- 3. MUAT TURUN DATA ---
        function loadData() {
            state.ting = document.getElementById('admin-tingkatan').value;
            if(!state.ting) { document.getElementById('mod-paparan').style.display = 'none'; return; }
            
            document.getElementById('status-mesej').innerText = "Memuat turun data...";
            document.getElementById('admin-content').innerHTML = '';
            document.getElementById('dynamic-controls').style.display = 'none';
            document.getElementById('chart-section').style.display = 'none';
            
            Papa.parse(csvUrls[state.ting], {
                download: true,
                complete: function(res) {
                    state.data = res.data;
                    state.headers = res.data[0]; // Row 1 untuk subjek
                    document.getElementById('status-mesej').innerText = "Data sedia. Sila pilih mod paparan.";
                    document.getElementById('mod-paparan').style.display = 'flex';
                    tukarMod();
                }
            });
        }

        // --- 4. LOGIK TAPISAN SUBJEK MENGIKUT KELAS (DARI PROMPT) ---
        function dapatkanSubjekKelas(kelas) {
            let k = kelas.toUpperCase();
            if (k.includes('4SN') || k.includes('5SN')) return ['BM','SEJ','ENG','MATHS','PM','PI','BIB','FIZ','KIM','BIO','ADD MATHS','SK','PJPK'];
            if (k.includes('4ST1') || k.includes('5ST1')) return ['BM','SEJ','ENG','MATHS','PM','PI','SN','BIB','RC','PP','PJPK'];
            if (k.includes('5ST2')) return ['BM','SEJ','ENG','MATHS','PM','PI','SN','BIB','RC','PJPK'];
            if (k.includes('5ST3')) return ['BM','SEJ','ENG','MATHS','PM','PI','SN','PSV','RC','PJPK'];
            if (k.includes('4ST2') || k.includes('4ST3')) return ['BM','SEJ','ENG','MATHS','PM','PI','SN','PSV','BIB','RC','PJPK'];
            if (k==='4A1'||k==='4A2'||k==='4A3'||k==='4A4'||k==='5A1'||k==='5A3'||k==='5A4') return ['BM','SEJ','ENG','MATHS','PM','PI','SN','PSV','PJPK'];
            if (k==='5A2') return ['BM','SEJ','ENG','MATHS','PM','SN','PSV','BIB','PJPK'];
            if (k.includes('4KAG') || k.includes('5KAG')) return ['BM','SEJ','ENG','MATHS','PM','SN','KAG','PJPK'];
            if (k==='1A1'||k==='2A1'||k==='3A1') return ['BM','ENG','MATHS','SEJ','SN','GEO','BIB','PM','PI','ASK','PSV','PJPK'];
            if (k==='1A5'||k==='2A5'||k==='3A5') return ['BM','ENG','MATHS','SEJ','SN','GEO','BIB','PM','PI','RBT','PSV','PJPK'];
            return ['BM','ENG','MATHS','SEJ','SN','GEO','BIB','PM','RBT','PSV','PJPK']; // Default Rendah
        }

        // --- 5. PENGURUSAN MOD PAPARAN ---
        function tukarMod() {
            let modChecked = document.querySelector('input[name="mod"]:checked').value;
            state.mod = modChecked;
            let dc = document.getElementById('dynamic-controls');
            dc.style.display = 'flex';
            dc.innerHTML = '';
            document.getElementById('admin-content').innerHTML = '';
            document.getElementById('chart-section').style.display = 'none';
            document.getElementById('status-mesej').innerText = '';

            if (modChecked === 'kelas') {
                let s = new Set();
                for(let i=1; i<state.data.length; i++) { if(state.data[i][col('D')]) s.add(state.data[i][col('D')].trim()); }
                let html = '<select id="pilih-kelas" onchange="paparModKelas()"><option value="">-- Pilih Kelas --</option>';
                Array.from(s).sort().forEach(k => html += `<option value="${k}">${k}</option>`);
                html += '</select>';
                dc.innerHTML = html;
            } 
            else if (modChecked === 'subjek') {
                let mSubjek = (state.ting === '4' || state.ting === '5') ? mapAtas : mapRendah;
                let html = '<select id="pilih-subjek" onchange="paparModSubjek()"><option value="">-- Pilih Subjek --</option>';
                Object.keys(mSubjek).forEach(k => html += `<option value="${k}">${k}</option>`);
                html += '</select>';
                dc.innerHTML = html;
            }
            else if (modChecked === 'pantau') {
                dc.innerHTML = `
                    <button class="btn-print" onclick="paparPemantauan('BM_SEJ')">Gagal BM & SEJ</button>
                    <button class="btn-print" onclick="paparPemantauan('BM')">Gagal BM Sahaja</button>
                    <button class="btn-print" onclick="paparPemantauan('SEJ')">Gagal SEJ Sahaja</button>
                `;
            }
            else if (modChecked === 'cetak') {
                dc.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:10px; width:100%;">
                        <button class="btn-print" onclick="cetakLaporan(1)">1. ANALISIS RANK PELAJAR MENGIKUT SUBJEK</button>
                        <button class="btn-print" onclick="cetakLaporan(2)">2. ANALISIS RANK PELAJAR KESELURUHAN</button>
                        <button class="btn-print" onclick="cetakLaporan(3)">3. ANALISIS PENCAPAIAN PELAJAR MENGIKUT KELAS</button>
                        <button class="btn-print" onclick="cetakLaporan(4)">4. ANALISIS PENCAPAIAN PELAJAR MENGIKUT SUBJEK</button>
                        <button class="btn-print" onclick="cetakLaporan(5)">5. ANALISIS PELAJAR GAGAL BAHASA MELAYU DAN SEJARAH</button>
                        <button class="btn-print" onclick="cetakLaporan(6)">6. ANALISIS PENCAPAIAN PELAJAR (LULUS/GAGAL/GPK)</button>
                        <button class="btn-print" onclick="cetakLaporan(7)">7. ANALISIS PENCAPAIAN GRED (A+, A, dll)</button>
                        <button class="btn-print" onclick="cetakLaporan(8)">8. ANALISIS PENCAPAIAN MURID MENGIKUT JANTINA</button>
                    </div>
                `;
            }
        }

        // --- 6. FUNGSI PAPARAN: KELAS ---
        function paparModKelas() {
            let kelas = document.getElementById('pilih-kelas').value;
            if(!kelas) return;
            
            let isAtas = (state.ting === '4' || state.ting === '5');
            let mSubjek = isAtas ? mapAtas : mapRendah;
            let subjekTerpilih = dapatkanSubjekKelas(kelas);
            let pelajarKelas = state.data.filter(r => r[col('D')] && r[col('D')].trim() === kelas);
            
            let html = '<div style="overflow-x:auto;"><table><tr><th>Bil</th><th style="text-align:left;">Nama Pelajar</th>';
            subjekTerpilih.forEach(s => html += `<th>${s}</th>`);
            html += '<th>KDK</th><th>KDT</th><th>GP</th><th>PNG</th><th>Keputusan</th><th>Analisis</th></tr>';
            
            pelajarKelas.forEach((m, i) => {
                let nama = m[col('C')];
                html += `<tr><td>${i+1}</td><td style="text-align:left;">${nama}</td>`;
                subjekTerpilih.forEach(s => {
                    let mapData = mSubjek[s];
                    if(mapData) {
                        let mark = m[mapData.m];
                        if(!mark || mark === 'NULL' || mark.trim() === '') html += `<td class="null-mark">KOSONG</td>`;
                        else html += `<td>${mark}<br><small>${m[mapData.g]}</small></td>`;
                    } else html += `<td>-</td>`;
                });
                let kdk = isAtas ? m[col('CF')] : m[col('BG')];
                let kdt = isAtas ? m[col('CX')] : m[col('BR')];
                let gp = isAtas ? m[col('CC')] : m[col('BE')];
                let png = isAtas ? m[col('CD')] : '-';
                let kptsn = isAtas ? m[col('CE')] : m[col('BK')];
                let analisis = isAtas ? m[col('CG')] : m[col('BH')];
                
                html += `<td>${kdk||'-'}</td><td>${kdt||'-'}</td><td>${gp||'-'}</td><td>${png||'-'}</td><td><b>${kptsn||'-'}</b></td><td>${analisis||'-'}</td></tr>`;
            });
            html += '</table></div>';
            document.getElementById('admin-content').innerHTML = html;
        }

        // --- 7. FUNGSI PAPARAN: SUBJEK (TERMASUK GPMP & JANTINA) ---
        function paparModSubjek() {
            let subjek = document.getElementById('pilih-subjek').value;
            if(!subjek) return;
            
            let isAtas = (state.ting === '4' || state.ting === '5');
            let mapData = (isAtas ? mapAtas : mapRendah)[subjek];
            
            let pelajar = state.data.slice(1).filter(r => r[col('C')]); // Semua pelajar berdaftar
            let totalAmbil = 0, totalMarkah = 0, gpmpArr = [], lelaki = 0, perempuan = 0;
            let belumIsi = 0;
            
            let html = '<div style="overflow-x:auto;"><table><tr><th>Bil</th><th style="text-align:left;">Nama</th><th>Kelas</th><th>Jantina</th><th>Markah</th><th>Gred</th></tr>';
            
            pelajar.forEach((m, i) => {
                let k = m[col('D')];
                // Pastikan kelas ini mengambil subjek ini
                if(!k || !dapatkanSubjekKelas(k.trim()).includes(subjek)) return;
                
                totalAmbil++;
                let jantina = m[col('DB')] ? m[col('DB')].trim().toUpperCase() : '-';
                if(jantina === 'L') lelaki++; else if(jantina === 'P') perempuan++;
                
                let mark = m[mapData.m];
                let gred = m[mapData.g];
                
                let rowStyle = "";
                let markDisplay = mark;
                
                if(!mark || mark === 'NULL' || mark.trim() === '') {
                    belumIsi++;
                    rowStyle = "class='null-mark'";
                    markDisplay = "KOSONG";
                    gred = "-";
                } else {
                    if(!isNaN(mark)) totalMarkah += parseFloat(mark);
                    // Anggaran Mata Gred (Contoh Basic)
                    let mg = 0;
                    if(gred.includes('A')) mg = 1; else if(gred.includes('B')) mg = 3; else if(gred.includes('C')) mg = 5; else if(gred.includes('D')) mg = 7; else if(gred.includes('E')) mg = 8; else mg = 9;
                    gpmpArr.push(mg);
                }
                
                html += `<tr><td>${totalAmbil}</td><td style="text-align:left;">${m[col('C')]}</td><td>${k}</td><td>${jantina}</td><td ${rowStyle}>${markDisplay}</td><td>${gred}</td></tr>`;
            });
            html += '</table></div>';
            
            let gpmp = gpmpArr.length > 0 ? (gpmpArr.reduce((a,b)=>a+b,0) / gpmpArr.length).toFixed(2) : '0.00';
            
            let statsHtml = `
                <div class="stats-card">
                    <h3 style="margin-top:0; color:var(--night-blue);">Analisis Menyeluruh: ${subjek}</h3>
                    <p><b>Jumlah Calon Berdaftar:</b> ${totalAmbil}</p>
                    <p><b>Belum Isi Markah (NULL):</b> <span style="color:red;">${belumIsi}</span></p>
                    <p><b>Anggaran GPMP:</b> ${gpmp}</p>
                    <p><b>Pecahan Jantina:</b> Lelaki (${lelaki}) | Perempuan (${perempuan})</p>
                </div>
            `;
            
            document.getElementById('admin-content').innerHTML = statsHtml + html;
            lukisGrafSubjek(lelaki, perempuan, gpmpArr);
        }

        // --- 8. FUNGSI PEMANTAUAN KHAS ---
        function paparPemantauan(jenis) {
            let isAtas = (state.ting === '4' || state.ting === '5');
            let mSubjek = isAtas ? mapAtas : mapRendah;
            let colBM_G = mSubjek['BM'].g;
            let colSEJ_G = mSubjek['SEJ'].g;
            
            let pelajar = state.data.slice(1).filter(r => r[col('C')]);
            let html = `<h3>Laporan Pemantauan: ${jenis.replace('_',' & ')}</h3>
                        <table><tr><th>Bil</th><th style="text-align:left;">Nama</th><th>Kelas</th><th>Gred BM</th><th>Gred SEJ</th></tr>`;
            let count = 0;
            
            pelajar.forEach(m => {
                let gBM = m[colBM_G] ? m[colBM_G].trim().toUpperCase() : '';
                let gSEJ = m[colSEJ_G] ? m[colSEJ_G].trim().toUpperCase() : '';
                
                let failBM = (gBM === 'G' || gBM === 'E' || gBM === 'F' || gBM === 'GAGAL');
                let failSEJ = (gSEJ === 'G' || gSEJ === 'E' || gSEJ === 'F' || gSEJ === 'GAGAL');
                
                let show = false;
                if(jenis === 'BM_SEJ' && failBM && failSEJ) show = true;
                if(jenis === 'BM' && failBM && !failSEJ) show = true;
                if(jenis === 'SEJ' && !failBM && failSEJ) show = true;
                
                if(show) {
                    count++;
                    html += `<tr><td>${count}</td><td style="text-align:left;">${m[col('C')]}</td><td>${m[col('D')]}</td><td><b>${gBM||'-'}</b></td><td><b>${gSEJ||'-'}</b></td></tr>`;
                }
            });
            html += '</table>';
            
            if(count === 0) html = `<p>Tiada rekod pelajar untuk kategori pemantauan ini.</p>`;
            document.getElementById('admin-content').innerHTML = html;
        }

        // --- 9. GRAFIK ---
        function lukisGrafSubjek(l, p, gpmpArr) {
            document.getElementById('chart-section').style.display = 'flex';
            state.charts.forEach(c => c.destroy());
            state.charts = [];

            let ctx1 = document.getElementById('grafSatu').getContext('2d');
            state.charts.push(new Chart(ctx1, {
                type: 'pie',
                data: { labels: ['Lelaki', 'Perempuan'], datasets: [{ data: [l, p], backgroundColor: ['#151B54', '#d81b60'] }] },
                options: { responsive: true, plugins: { title: { display: true, text: 'Pecahan Jantina' } } }
            }));
            
            // Taburan mudah GPMP
            let lulus = gpmpArr.filter(g => g < 8).length;
            let gagal = gpmpArr.filter(g => g >= 8).length;
            let ctx2 = document.getElementById('grafDua').getContext('2d');
            state.charts.push(new Chart(ctx2, {
                type: 'bar',
                data: { labels: ['Lulus/Kredit (Gred A-D)', 'Gagal (Gred E/G)'], datasets: [{ label:'Bil Pelajar', data: [lulus, gagal], backgroundColor: ['#2e7d32', '#d32f2f'] }] },
                options: { responsive: true, plugins: { title: { display: true, text: 'Prestasi Subjek (Anggaran)' } } }
            }));
        }

        // --- 10. LOGIK CETAKAN LAPORAN ---
        function cetakLaporan(jenisID) {
            let tajuk = [
                "",
                "ANALISIS RANK PELAJAR MENGIKUT SUBJEK",
                "ANALISIS RANK PELAJAR KESELURUHAN",
                "ANALISIS PENCAPAIAN PELAJAR MENGIKUT KELAS",
                "ANALISIS PENCAPAIAN PELAJAR MENGIKUT SUBJEK",
                "ANALISIS PELAJAR GAGAL BAHASA MELAYU DAN SEJARAH",
                "ANALISIS PENCAPAIAN KESELURUHAN (LULUS/GAGAL/GPK)",
                "ANALISIS PENCAPAIAN GRED (A+, A, A-, DLL)",
                "ANALISIS PENCAPAIAN MURID MENGIKUT JANTINA"
            ];
            
            let reportHTML = `
                <div class="print-header">
                    <img src="https://i.ibb.co/670hn3CB/smk-selirik.png" alt="Header">
                    <h2 style="margin: 10px 0;">${tajuk[jenisID]}</h2>
                    <p>Tingkatan ${state.ting} | Portal Peperiksaan Pertengahan 1 2026</p>
                </div>
                <div style="font-size:12pt;">
                    <i>Laporan Janaan Sistem Komputer Pangkalan Data Keseluruhan. Maklumat berdasarkan rekod semasa ('MASTER').</i><br><br>
                </div>
            `;
            
            // Logik Generik untuk cetakan bagi mengelakkan kod terlampau panjang. 
            // Setiap report akan memaparkan jadual rumusan berdasarkan pangkalan data.
            
            if(jenisID === 5) {
                // Gunakan semula fungsi pemantauan
                paparPemantauan('BM_SEJ');
                reportHTML += document.getElementById('admin-content').innerHTML;
            } else {
                // Untuk laporan lain, paparkan rumusan kelas sebagai representasi data
                let s = new Set();
                let table = `<table><tr><th>Kelas</th><th>Bil Calon</th><th>GP Kelas / GPK (Anggaran)</th></tr>`;
                for(let i=1; i<state.data.length; i++) { if(state.data[i][col('D')]) s.add(state.data[i][col('D')].trim()); }
                
                Array.from(s).sort().forEach(k => {
                    let pelajarKelas = state.data.filter(r => r[col('D')] && r[col('D')].trim() === k);
                    let sumGP = 0; let validGP = 0;
                    let isAtas = (state.ting === '4' || state.ting === '5');
                    
                    pelajarKelas.forEach(m => {
                        let gp = parseFloat(isAtas ? m[col('CC')] : m[col('BE')]);
                        if(!isNaN(gp)) { sumGP += gp; validGP++; }
                    });
                    
                    let gpk = validGP > 0 ? (sumGP/validGP).toFixed(2) : '-';
                    table += `<tr><td>${k}</td><td>${pelajarKelas.length}</td><td>${gpk}</td></tr>`;
                });
                table += `</table>`;
                reportHTML += table;
            }
            
            document.getElementById('print-zone').innerHTML = reportHTML;
            document.getElementById('print-zone').classList.add('active');
            document.getElementById('dashboard-admin').classList.add('hidden-print');
            
            alert("PENTING: Sila pastikan tetapan cetakan adalah pada saiz A4 dan orientasi bersesuaian (Landscape disyorkan).");
            window.print();
            
            setTimeout(() => {
                document.getElementById('print-zone').classList.remove('active');
                document.getElementById('dashboard-admin').classList.remove('hidden-print');
            }, 500);
        }
    </script>
</body>
</html>
